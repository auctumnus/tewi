{% macro removed_image() %}
  <div
    class="attachment"
    x-data="{open, height: 140, width: 160}"
    x-bind:class="{'expanded': open}"
  >
    <img
      class="attachment-media"
      src="/assets/removed-by-moderator.png"
      x-bind:width="open ? undefined : width"
      x-on:click="open = !open; onExpand('{{ attachment.id }}', open);"
    />
    <a class="filename" href="/assets/removed-by-moderator.png">
      {{ attachment.original_filename }}
    </a>
  </div>
{% endmacro %}
