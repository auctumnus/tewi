{% extends "layout.html" %}
{% block title %}tewi - Home{% endblock %}
{% block head %}
<script src="/static/home.js"></script>
{% endblock %}
{% block content %}
<main class="home">
  <div class="container-narrow board-index">
    {% for category in categories %}
    <div class="board-category">
      <span>{{ category.name }}</span>
      <hr />
      <ul>
        {% for board in boards %}
        <li class="board-list-entry">
          <a href="/board/{{ board.slug }}">{{ board.name }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
    {% endfor %}
  </div>
</main>
{% endblock %}
